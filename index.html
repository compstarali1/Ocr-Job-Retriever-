<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=0.9" />
<title>Asset Manager Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root { --brand:#0056b3; --accent:#28a745; --bg:#eef2f7; --pink:#ec4899; }
  body{margin:0;font-family:sans-serif;background:#121826;padding:10px;color:#e2e8f0;}
  header{background:linear-gradient(135deg,#0056b3,#003f80);color:#fff;padding:20px;text-align:center;border-radius:12px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
  main{max-width:1150px;margin:0 auto;background:#1e293b;padding:25px;border-radius:15px;box-shadow:0 8px 25px rgba(0,0,0,0.4);}
  .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
  input[type=file]{padding:8px;border:1px solid #475569;border-radius:8px;background:#0f172a;color:white;}
  button{border:none;border-radius:12px;font-weight:700;cursor:pointer;padding:14px 20px;color:#fff;transition:0.2s;box-shadow:0 5px 0 rgba(0,0,0,0.2);}
  button:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,0.2);}
  .primary{background:var(--accent);}
  #openOCRScanner{background:var(--pink);}
  .small{background:#3b82f6;font-size:0.85rem;padding:10px 15px;}
  .assetGrid{display:flex;flex-wrap:wrap;gap:15px;margin-top:20px;}
  .assetBtn{min-width:160px;background:#10b981;font-size:1.1rem;box-shadow: 0 5px 0 #065f46;}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:15px;}
  .modal.show{display:flex;}
  .modalCard{width:100%;max-width:1100px;height:92vh;background:#1e293b;border-radius:18px;display:flex;flex-direction:column;overflow:hidden;color:white;}
  .modalHeader{padding:18px;background:#334155;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #475569;}
  .modalBody{padding:25px;overflow-y:auto;flex:1;}
  .thumbBox{display:inline-block;margin:8px;position:relative;border:1px solid #475569;padding:5px;border-radius:8px;}
  .thumb{width:130px;height:90px;object-fit:cover;display:block;border-radius:4px;}
  .remove-btn{position:absolute;top:-5px;right:-5px;background:red;color:white;border-radius:50%;width:24px;height:24px;cursor:pointer;border:none;font-weight:bold;}
  #ocrTarget{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:80px;border:4px solid var(--pink);pointer-events:none;z-index:10;}
  video{background:#000;border-radius:10px;width:100%;}
  textarea, input[type=text] { background: #0f172a; color: #fff; border: 1px solid #475569; padding: 12px; border-radius: 8px; width: 100%; }
</style>
</head>
<body>

<header><strong>Service Engineer — Asset Visual Manager & OCR</strong></header>

<main>
  <div class="controls">
    <input id="excelInput" type="file" accept=".xlsx,.xls" />
    <button id="extractBtn" class="primary" disabled>Extract Excel</button>
    <button id="openOCRScanner">SCAN ASSET ID</button>
    <button id="exportAllBtn" class="small">Export .daf</button>
    <button id="importDafBtn" class="small">Import .daf</button>
    <button id="clearAllBtn" class="small" style="background:#ef4444;">Clear All</button>
  </div>
  <div id="assetContainer"><p style="color:#94a3b8;">Load Excel file to begin...</p></div>
</main>

<!-- Asset Detail Modal -->
<div id="assetModal" class="modal">
  <div class="modalCard">
    <div class="modalHeader">
      <strong id="modalTitle" style="font-size:1.4rem;">Asset Details</strong>
      <button id="closeAssetBtn" class="small" style="background:#64748b;">Close</button>
    </div>
    <div class="modalBody">
      <div style="display:flex;gap:25px;flex-wrap:wrap;">
        <div style="flex:1;min-width:300px;">
          <label><b>Asset Number</b></label>
          <input id="assetId" type="text" readonly style="margin:10px 0;">
          <label><b>Description</b></label>
          <textarea id="assetFullDesc" rows="3" readonly style="margin-top:10px;"></textarea>
          
          <div style="margin-top:20px;padding:15px;background:#334155;border-radius:12px;">
            <strong>Camera Attachment</strong>
            <div style="margin-top:10px;display:flex;gap:10px;">
              <button id="openCamera" class="small">Open Camera</button>
              <button id="takePhoto" class="small" style="display:none;background:#22c55e;">Capture</button>
            </div>
            <video id="cameraView" autoplay playsinline style="display:none;margin-top:15px;"></video>
          </div>
        </div>
        
        <div style="flex:1;min-width:300px;">
          <label><b>Engineer Job Report</b></label>
          <textarea id="engineerReport" rows="8" style="margin-top:10px;" placeholder="Describe work carried out..."></textarea>
          <div style="margin-top:15px;display:flex;gap:10px;">
            <button id="saveAssetBtn" class="primary" style="flex:1;">SAVE & EXPORT JPG</button>
            <button id="attachFromFilesBtn" class="small">Upload Files</button>
          </div>
        </div>
      </div>
      <div id="attachments" style="display:flex;flex-wrap:wrap;margin-top:15px;border-top:1px solid #475569;padding-top:15px;"></div>
    </div>
  </div>
</div>

<!-- OCR Modal -->
<div id="ocrModal" class="modal">
  <div class="modalCard" style="max-width:500px;height:auto;">
    <div class="modalHeader"><strong>Scanning...</strong><button id="closeOCR" class="small">Cancel</button></div>
    <div class="modalBody" style="background:#000;padding:0;position:relative;height:400px;">
      <video id="ocrCamera" autoplay playsinline muted style="height:100%;object-fit:cover;"></video>
      <div id="ocrTarget"></div>
    </div>
  </div>
</div>

<canvas id="ocrCanvas" style="display:none;"></canvas>
<input id="importDafInput" type="file" accept=".daf" style="display:none;">

<script>
const $ = id => document.getElementById(id);
let assetsMap = {}, currentAsset = null, cameraStream = null, ocrStream = null, isOcrActive = false;
const assetRegex = /(?=[A-Z0-9]{3,})[A-Z]{0,4}\d{1,6}/g;

const saveToLocal = () => localStorage.setItem("AssetManager_Data", JSON.stringify(assetsMap));

window.onload = () => {
    const data = localStorage.getItem("AssetManager_Data");
    if (data) { assetsMap = JSON.parse(data); renderAssetButtons(); }
};

// EXCEL LOADING
$("excelInput").onchange = () => $("extractBtn").disabled = !$("excelInput").files.length;
$("extractBtn").onclick = () => {
    const reader = new FileReader();
    reader.onload = e => {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
        assetsMap = {};
        data.forEach(row => {
            row.forEach(cell => {
                const matches = String(cell).match(assetRegex);
                if (matches) matches.forEach(m => {
                    if (!assetsMap[m]) assetsMap[m] = { description: row.join(" | "), report: "", attachments: [] };
                });
            });
        });
        renderAssetButtons(); saveToLocal();
    };
    reader.readAsArrayBuffer($("excelInput").files[0]);
};

function renderAssetButtons() {
    const container = $("assetContainer"); container.innerHTML = "";
    const grid = document.createElement("div"); grid.className = "assetGrid";
    Object.keys(assetsMap).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})).forEach(id => {
        const btn = document.createElement("button");
        btn.className = "assetBtn"; btn.textContent = id;
        btn.onclick = () => openAssetModal(id);
        grid.appendChild(btn);
    });
    container.appendChild(grid);
}

// OCR SCANNER LOOP
$("openOCRScanner").onclick = async () => {
    ocrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    $("ocrCamera").srcObject = ocrStream; $("ocrModal").classList.add("show");
    isOcrActive = true; ocrScanLoop();
};

async function ocrScanLoop() {
    if (!isOcrActive) return;
    const canvas = $("ocrCanvas"), ctx = canvas.getContext("2d"), v = $("ocrCamera");
    if (v.readyState === v.HAVE_ENOUGH_DATA) {
        canvas.width = 300; canvas.height = 120;
        ctx.drawImage(v, v.videoWidth/2-200, v.videoHeight/2-60, 400, 120, 0, 0, 400, 120);
        const res = await Tesseract.recognize(canvas, "eng");
        const found = res.data.text.toUpperCase().replace(/\s/g, "").match(assetRegex);
        if (found && assetsMap[found[0]]) {
            isOcrActive = false; ocrStream.getTracks().forEach(t => t.stop());
            $("ocrModal").classList.remove("show"); openAssetModal(found[0]); return;
        }
    }
    setTimeout(ocrScanLoop, 200);
}

$("closeOCR").onclick = () => { isOcrActive = false; if(ocrStream) ocrStream.getTracks().forEach(t => t.stop()); $("ocrModal").classList.remove("show"); };
$("clearAllBtn").onclick = () => confirm("Clear ALL data?") && (localStorage.clear(), location.reload());
function openAssetModal(id) {
    currentAsset = id;
    const data = assetsMap[id];
    $("modalTitle").textContent = "Asset: " + id;
    $("assetId").value = id;
    $("assetFullDesc").value = data.description || "";
    $("engineerReport").value = data.report || "";
    $("cameraView").style.display = "none";
    updateAttachmentsUI();
    $("assetModal").classList.add("show");
}

function updateAttachmentsUI() {
    const container = $("attachments"); container.innerHTML = "";
    assetsMap[currentAsset].attachments.forEach((file, idx) => {
        const box = document.createElement("div"); box.className = "thumbBox";
        box.innerHTML = `<img src="${file.url}" class="thumb"><button class="remove-btn" onclick="removeAttachment(${idx})">×</button>`;
        container.appendChild(box);
    });
}

window.removeAttachment = idx => {
    assetsMap[currentAsset].attachments.splice(idx, 1);
    updateAttachmentsUI(); saveToLocal();
};

// CAMERA & FILE UPLOAD
$("openCamera").onclick = async () => {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    $("cameraView").srcObject = cameraStream; $("cameraView").style.display = "block"; $("takePhoto").style.display = "inline-block";
};

$("takePhoto").onclick = () => {
    const canvas = document.createElement("canvas"), v = $("cameraView");
    canvas.width = v.videoWidth; canvas.height = v.videoHeight;
    canvas.getContext("2d").drawImage(v, 0, 0);
    assetsMap[currentAsset].attachments.push({ url: canvas.toDataURL("image/jpeg", 0.8), name: Date.now()+".jpg" });
    updateAttachmentsUI();
    cameraStream.getTracks().forEach(t => t.stop());
    v.style.display = "none"; $("takePhoto").style.display = "none";
    saveToLocal();
};

$("attachFromFilesBtn").onclick = () => {
    const inp = document.createElement('input'); inp.type = 'file'; inp.multiple = true; inp.accept = "image/*";
    inp.onchange = e => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = ev => { assetsMap[currentAsset].attachments.push({ url: ev.target.result, name: file.name }); updateAttachmentsUI(); saveToLocal(); };
            reader.readAsDataURL(file);
        });
    };
    inp.click();
};

// THE JPG REPORT EXPORTER
$("saveAssetBtn").onclick = async () => {
    const asset = assetsMap[currentAsset];
    asset.report = $("engineerReport").value;
    saveToLocal();

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 1000;
    canvas.height = 1800; // Large canvas to fit photos

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#000000";

    let y = 60;
    ctx.font = "bold 34px Arial"; ctx.fillText("ASSET SERVICE REPORT: " + currentAsset, 40, y);
    y += 70; ctx.font = "bold 22px Arial"; ctx.fillText("Description:", 40, y);
    y += 35; ctx.font = "18px Arial"; wrapText(ctx, asset.description || "N/A", 40, y, 920, 26);
    y += 110; ctx.font = "bold 22px Arial"; ctx.fillText("Engineer Job Report:", 40, y);
    y += 35; ctx.font = "18px Arial"; wrapText(ctx, asset.report || "No details provided.", 40, y, 920, 26);
    y += 120;

    const imgPromises = asset.attachments.map(a => new Promise(res => {
        const img = new Image(); img.onload = () => res(img); img.src = a.url;
    }));

    const images = await Promise.all(imgPromises);
    images.forEach((img, i) => {
        let w = 440;
        let h = img.height * (w / img.width);
        let x = (i % 2 === 0) ? 40 : 520; // 2-column layout
        ctx.drawImage(img, x, y, w, h);
        if (i % 2 !== 0) y += h + 30;
    });

    const link = document.createElement("a");
    link.download = currentAsset + "_REPORT.jpg";
    link.href = canvas.toDataURL("image/jpeg", 0.9);
    link.click();
};

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(" "); let line = "";
    for (let n = 0; n < words.length; n++) {
        let test = line + words[n] + " ";
        if (ctx.measureText(test).width > maxWidth && n > 0) {
            ctx.fillText(line, x, y); line = words[n] + " "; y += lineHeight;
        } else { line = test; }
    }
    ctx.fillText(line, x, y);
}

$("closeAssetBtn").onclick = () => {
    $("assetModal").classList.remove("show");
    if(cameraStream) cameraStream.getTracks().forEach(t => t.stop());
};

</script>

</body>
</html>
